<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Calculator</title>
</head>
<body>
 
    <div class="Calculator" id="calc">
           <div><button class = "power"></button> </div>
        <input type="text" placeholder="0" id="inputbox">
        <div>
            <button class="operator" id="ac">AC</button>
            <button class="operator" >DEL</button>
            <button class="operator">%</button>
            <button class="operator">/</button>
        </div>
        <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">x</button>
        </div>
        <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>
        </div>
        <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>
        </div>
        <div>
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button class="equal">=</button>
           
            <audio id="click-sound" src="keyboard-click-327728.mp3" preload="auto"></audio>
            <script src="javascpt.js"></script>
        </div>
     
    </div>
    
</body>
</html>
